<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Operation GOM</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="container">

    <header>

        <h2>OPERATION GOM</h2>

        <h1>Archives du 20 Juillet</h1>

        <p class="subtitle">
            Base de données historique confidentielle
        </p>

    </header>

    <!-- LOGIN -->

    <section id="loginScreen">

        <label>Nom d'utilisateur</label>

        <input
            id="username"
            type="text"
            placeholder="Entrez votre prénom">

        <button onclick="login()">
            ACCÉDER
        </button>

    </section>

    <!-- ARCHIVE -->

    <section id="archiveScreen" class="hidden">

        <div class="progress">

            <div class="progressText">
                Archives déverrouillées
            </div>

            <div class="progressBar">

                <div id="progressFill"></div>

            </div>

            <div id="progressNumber">
                1 / 5
            </div>

        </div>

        <hr>

        <h2 id="archiveTitle"></h2>

        <h3 id="archiveDate"></h3>

        <p id="archiveText"></p>

        <img
            id="archiveImage"
            src=""
            alt="Indice">

        <div class="hintBox">

            <button onclick="showHint()">

                💡 Besoin d'un indice ?

            </button>

            <p id="hint"></p>

        </div>

        <label>

            Clé d'accès suivante

        </label>

        <input
            id="nextKey"
            type="text"
            placeholder="Entrer la réponse">

        <button onclick="nextArchive()">

            VALIDER

        </button>

    </section>

    <!-- FINAL PAGE -->

    <section id="finalScreen" class="hidden">

        <h2>

            ❤️ Félicitations ❤️

        </h2>

        <p id="finalLetter">

            Ton texte apparaîtra ici.

        </p>

    </section>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>

</html>
