<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operation GOM</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h3>ARCHIVES CLASSIFIÉES</h3>

<h1>20 JUILLET</h1>

<p class="subtitle">
Base de données historique confidentielle
</p>

<div id="login">

<label>Nom d'utilisateur</label>

<input
id="username"
type="text"
placeholder="Entrer votre prénom">

<button onclick="login()">
ACCÉDER
</button>

</div>

<div id="secondLogin" style="display:none;">

<p class="success">
✓ Utilisateur reconnu
</p>

<p>
Bienvenue, <span id="name"></span>.
</p>

<p>
Une authentification secondaire est requise.
</p>

<label>Clé d'accès</label>

<input
id="key"
type="text"
placeholder="Entrer la clé">

<button onclick="checkKey()">
DÉVERROUILLER
</button>

</div>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
